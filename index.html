<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Abundance Architect — David</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-l:#E8C97A;--gold-d:#7A6030;--gold-f:rgba(201,168,76,0.07);
  --bg:#080808;--dark:#0E0E0E;--mid:#161616;--card:#121212;
  --b:rgba(201,168,76,0.11);--bh:rgba(201,168,76,0.38);
  --text:#E8E4DC;--muted:#5A5A52;
  --green:#4CAF50;--red:#e74c3c;--amber:#f39c12;
}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;height:100vh;overflow:hidden}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:268px;min-width:268px;background:var(--dark);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:18px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:11px}
.gem{width:32px;height:32px;min-width:32px;border:1px solid var(--gold-d);display:flex;align-items:center;justify-content:center;transform:rotate(45deg);font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--gold)}
.gem span{transform:rotate(-45deg);display:block}
.logo-t{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--text)}
.logo-s{font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.sb-body{flex:1;overflow-y:auto}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px}
.sec{padding:14px 13px 6px}
.sec-l{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-d);font-weight:600;margin-bottom:9px;display:block}
.dl{height:1px;background:var(--b);margin:4px 0}

.pillars-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.pillar-card{background:var(--card);border:1px solid var(--b);padding:9px 7px;cursor:pointer;text-align:center;transition:border-color .2s,background .2s}
.pillar-card:hover{border-color:var(--bh);background:var(--gold-f)}
.p-emoji{font-size:15px;display:block;margin-bottom:3px}
.p-name{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:600;display:block}
.p-score{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;color:var(--text);display:block;margin-top:1px}

.fin-grid{display:flex;flex-direction:column;gap:3px}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:6px 9px;background:var(--card);border:1px solid var(--b)}
.fin-l{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.fin-v{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:300}
.fin-v.green{color:var(--green)}.fin-v.red{color:var(--red)}.fin-v.amber{color:var(--amber)}.fin-v.gold{color:var(--gold-l)}
.fin-div{height:1px;background:var(--b);margin:3px 0}

.biz-list{display:flex;flex-direction:column;gap:4px}
.biz-card{background:var(--card);border:1px solid var(--b);padding:8px 9px;cursor:pointer;transition:border-color .2s}
.biz-card:hover{border-color:var(--bh)}
.biz-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.biz-name{font-size:10px;color:var(--text);font-weight:500}
.biz-badge{font-size:7px;letter-spacing:1px;text-transform:uppercase;padding:2px 5px;font-weight:600}
.biz-badge.star{background:rgba(201,168,76,0.12);color:var(--gold)}
.biz-badge.sell{background:rgba(231,76,60,0.12);color:var(--red)}
.biz-stat{font-size:9px;color:var(--muted)}

.lens-list{display:flex;flex-direction:column;gap:2px}
.lens-item{display:flex;align-items:center;gap:8px;padding:5px 7px;cursor:pointer;border:1px solid transparent;transition:border-color .2s,background .2s}
.lens-item:hover{border-color:var(--b);background:var(--gold-f)}
.lens-n{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:300;color:var(--gold-d);min-width:13px}
.lens-name{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

.commit-list{display:flex;flex-direction:column;gap:4px}
.commit-item{background:var(--card);border:1px solid var(--b);padding:7px 9px;cursor:pointer;transition:border-color .2s;display:flex;align-items:flex-start;gap:6px}
.commit-item:hover{border-color:var(--bh)}
.commit-item.done{opacity:.4}
.commit-check{width:11px;height:11px;min-width:11px;border:1px solid var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--gold);margin-top:2px}
.commit-text{font-size:10px;color:var(--text);line-height:1.4;font-family:'Cormorant Garamond',serif;font-style:italic}
.commit-date{font-size:8px;color:var(--gold-d);margin-top:2px;letter-spacing:1px;text-transform:uppercase}
.no-commits{font-size:10px;color:var(--muted);font-style:italic;font-family:'Cormorant Garamond',serif;text-align:center;padding:10px 0}

.sb-foot{padding:11px 13px;border-top:1px solid var(--b);font-size:8px;color:var(--muted);text-align:center;letter-spacing:2px;text-transform:uppercase;flex-shrink:0}
.wide-btn{width:100%;background:none;border:1px solid var(--b);color:var(--muted);font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:5px 0;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s;margin-top:6px}
.wide-btn:hover{border-color:var(--gold-d);color:var(--gold)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:13px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:var(--dark);flex-shrink:0}
.ch-left{display:flex;align-items:center;gap:11px}
.coach-av{width:34px;height:34px;border:1px solid var(--gold-d);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);position:relative}
.online-dot{width:7px;height:7px;background:var(--green);border-radius:50%;position:absolute;bottom:-2px;right:-2px;border:1px solid var(--dark);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.coach-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--text)}
.coach-status{font-size:8px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.h-btns{display:flex;gap:6px}
.h-btn{background:none;border:1px solid var(--b);color:var(--muted);font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:5px 9px;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s}
.h-btn:hover{border-color:var(--gold-d);color:var(--gold)}
.h-btn.danger:hover{border-color:var(--red);color:var(--red)}

.msgs-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msgs-area::-webkit-scrollbar{width:3px}
.msgs-area::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px}
.msg{display:flex;gap:9px}
.msg.user{flex-direction:row-reverse;margin-left:auto;max-width:72%}
.msg.coach{max-width:88%}
.msg-av{width:28px;height:28px;min-width:28px;border:1px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'Cormorant Garamond',serif;color:var(--gold);align-self:flex-start}
.msg.user .msg-av{color:var(--muted)}
.bubble{padding:12px 15px;font-size:13px;line-height:1.75;font-weight:300}
.msg.coach .bubble{background:#111110;border:1px solid var(--b);color:var(--text);border-left:2px solid var(--gold-d)}
.msg.user .bubble{background:#181810;border:1px solid rgba(201,168,76,0.12);color:var(--text)}
.bubble strong{color:var(--gold-l);font-weight:600}
.bubble em{font-style:italic;color:rgba(232,228,220,.7)}
.msg-meta{font-size:8px;color:var(--muted);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.msg.user .msg-meta{text-align:right}
.typing{display:flex;align-items:center;gap:5px;padding:12px 15px}
.tdot{width:5px;height:5px;background:var(--gold-d);border-radius:50%;animation:tb 1.2s ease-in-out infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}

.err-bar{margin:0 20px 8px;padding:9px 13px;background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.25);color:#e74c3c;font-size:11px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.retry-btn{background:none;border:1px solid rgba(231,76,60,0.4);color:#e74c3c;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;cursor:pointer;font-family:'Montserrat',sans-serif}
.retry-btn:hover{background:rgba(231,76,60,0.1)}

.quick-bar{padding:0 20px 11px;display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.q-btn{background:none;border:1px solid var(--b);color:var(--muted);font-size:8px;letter-spacing:1px;padding:5px 10px;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s;white-space:nowrap;text-transform:uppercase}
.q-btn:hover{border-color:var(--gold-d);color:var(--gold);background:var(--gold-f)}

.input-area{padding:13px 20px;border-top:1px solid var(--b);background:var(--dark);display:flex;gap:9px;align-items:flex-end;flex-shrink:0}
.input-wrap{flex:1}
.chat-inp{width:100%;background:var(--mid);border:1px solid var(--b);color:var(--text);font-size:13px;font-weight:300;font-family:'Montserrat',sans-serif;padding:10px 13px;resize:none;outline:none;line-height:1.5;transition:border-color .2s;min-height:44px;max-height:130px}
.chat-inp:focus{border-color:var(--gold-d)}
.chat-inp::placeholder{color:var(--muted)}
.send-btn{background:var(--gold-d);border:none;color:var(--text);font-size:16px;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.send-btn:hover:not(:disabled){background:var(--gold);color:var(--bg)}
.send-btn:disabled{opacity:.35;cursor:not-allowed}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
.modal{background:var(--dark);border:1px solid var(--b);padding:30px;max-width:440px;width:100%;border-top:2px solid var(--gold-d)}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--text);margin-bottom:4px}
.modal-sub{font-size:9px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:20px}
.modal-field{margin-bottom:13px}
.modal-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block}
.modal-inp,.modal-ta{width:100%;background:var(--mid);border:1px solid var(--b);color:var(--text);font-size:13px;font-weight:300;font-family:'Montserrat',sans-serif;padding:9px 12px;outline:none;transition:border-color .2s}
.modal-ta{resize:vertical;min-height:70px}
.modal-inp:focus,.modal-ta:focus{border-color:var(--gold-d)}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.m-btn{flex:1;padding:10px;border:1px solid var(--b);background:none;color:var(--muted);cursor:pointer;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:'Montserrat',sans-serif;transition:all .2s}
.m-btn.primary{background:var(--gold-d);border-color:var(--gold-d);color:var(--text)}
.m-btn:hover{border-color:var(--gold-d);color:var(--gold)}
.m-btn.primary:hover{background:var(--gold);color:var(--bg)}
.score-rows{display:flex;flex-direction:column;gap:13px}
.score-row{display:flex;align-items:center;gap:12px}
.score-lbl{font-size:10px;color:var(--muted);width:80px;text-transform:uppercase;letter-spacing:1px}
.score-sl{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:var(--b);outline:none;cursor:pointer}
.score-sl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--gold);cursor:pointer;border-radius:0;transform:rotate(45deg)}
.score-val{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--gold);width:24px;text-align:center}

/* API KEY SCREEN */
.api-screen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:40px;gap:0}
.api-gem{width:52px;height:52px;border:1px solid var(--gold-d);display:flex;align-items:center;justify-content:center;transform:rotate(45deg);font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);margin-bottom:32px}
.api-gem span{transform:rotate(-45deg);display:block}
.api-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,42px);font-weight:300;color:var(--text);text-align:center;margin-bottom:6px}
.api-title em{font-style:italic;color:var(--gold-l)}
.api-sub{font-size:11px;color:var(--muted);margin-bottom:32px;letter-spacing:1px;text-align:center}
.api-box{max-width:440px;width:100%;padding:24px;border:1px solid var(--b);border-left:2px solid var(--gold-d);background:var(--card)}
.api-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-d);margin-bottom:10px;display:block}
.api-inp{width:100%;background:var(--mid);border:1px solid var(--b);color:var(--text);font-size:13px;font-weight:300;font-family:'Montserrat',sans-serif;padding:10px 13px;outline:none;transition:border-color .2s;margin-bottom:12px;letter-spacing:1px}
.api-inp:focus{border-color:var(--gold-d)}
.api-inp::placeholder{color:var(--muted);letter-spacing:0}
.api-btn{width:100%;background:var(--gold-d);border:none;color:var(--text);font-size:10px;letter-spacing:4px;text-transform:uppercase;padding:12px;cursor:pointer;font-family:'Montserrat',sans-serif;transition:background .2s}
.api-btn:hover{background:var(--gold);color:var(--bg)}
.api-hint{font-size:10px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.6}
.api-hint a{color:var(--gold-d);text-decoration:none}
.api-hint a:hover{color:var(--gold)}
.api-err{color:var(--red);font-size:10px;margin-top:8px;text-align:center}

/* ONBOARDING */
.ob-screen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:40px}
.ob-eye{font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:13px;font-weight:600}
.ob-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,46px);font-weight:300;color:var(--text);text-align:center;line-height:1.1;margin-bottom:6px}
.ob-title em{font-style:italic;color:var(--gold-l)}
.ob-sub{font-size:11px;color:var(--muted);text-align:center;margin-bottom:28px;letter-spacing:1px}
.ob-ctx{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;font-weight:300;color:rgba(232,228,220,.65);text-align:left;max-width:460px;line-height:1.75;margin-bottom:28px;padding:18px 22px;border:1px solid var(--b);border-left:2px solid var(--gold-d)}
.ob-ctx-l{font-family:'Montserrat',sans-serif;font-style:normal;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:8px}
.ob-btn{background:none;border:1px solid var(--gold-d);color:var(--gold);font-size:10px;letter-spacing:4px;text-transform:uppercase;padding:12px 34px;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .3s}
.ob-btn:hover{background:var(--gold-d);color:var(--text)}

/* content */
.bubble-content p{margin-bottom:8px}.bubble-content p:last-child{margin-bottom:0}
.bubble-content ul,.bubble-content ol{padding-left:20px;margin-bottom:8px}
.bubble-content li{margin-bottom:3px}
.bubble-content h3{color:var(--gold-l);font-size:11px;margin-bottom:5px;font-weight:600;letter-spacing:1px;text-transform:uppercase}

@media(max-width:700px){.sb{display:none}.quick-bar{display:none}}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are The Abundance Architect — a world-class business and life coach using billionaire-level strategic thinking. Draw from Buffett, Munger, Dalio, Naval Ravikant, Howard Marks.

FOUR PILLARS: Wealth · Health · Happiness · Legacy

PHILOSOPHY: Think in systems. Inversion. Asymmetric bets. Compounding. Clarity. Energy.

ABUNDANCE LENS: 1) Clarity Check 2) First Principles 3) Inversion 4) Asymmetry Scan 5) Compounding Horizon 6) Energy Alignment 7) Execution Gap

MENTAL MODELS: Circle of Competence, Margin of Safety, Second-Order Thinking, Barbell Strategy, Leverage (Naval), 80/20, Regret Minimization, Stoic Dichotomy, Fear-Setting.

STYLE: Direct, warm, demanding. No fluff. Challenge limiting beliefs. Normalize audacity. Speak to David as already operating at a high level.

END SESSIONS with Commitment Close: "What is the one commitment you're making? By what date? What's at stake if you don't?"

BOUNDARIES: Coach only — not therapist, financial advisor, or doctor.

CLIENT — DAVID:
- Ex-COO ($195k/yr), left 2 years ago to buy coffee shop franchises. Job-searching now as bridge.
- BRIC coffee shop: paid $20k, generates ~$8k/month net. STAR ASSET — protect above all.
- Carmela Delray East: paid $335k, underperforming, FOR SALE (no traction yet).
- Carmela Stuart: paid $155k (franchisor has $75k loan), underperforming, FOR SALE.
- 7 rental properties: ~$5k/month net. 1 investment apartment ($145k, RE market down, holding).
- Total monthly income: ~$13k/month. Prior income was $16.3k/month as COO.
- Investments: E*Trade $87k + Schwab/Creative Planning $887k = $974k total.
- Debt: $100k@12% private loan (PRIORITY 1 — most expensive), $100k@0% family loan, $280k borrowed capital, $50k credit cards (PRIORITY 2).
- $350k HELOC lent to others who defaulted — in litigation — treat as impaired/zero.
- NOT in crisis. Cash flow pressure, not wealth destruction. Architecture is fundamentally strong.
- TOP PRIORITIES: 1) Sell Delray East + Stuart fast 2) Get COO job $150-200k 3) Kill 12% loan 4) Protect BRIC.`;

const PILLARS = [
  {id:'wealth',e:'💰',l:'Wealth'},
  {id:'health',e:'⚡',l:'Health'},
  {id:'happiness',e:'🧭',l:'Happiness'},
  {id:'legacy',e:'🏛',l:'Legacy'}
];
const BIZS = [
  {id:'bric',n:'BRIC',s:'~$8k/month',cls:'star',bl:'⭐ Star Asset'},
  {id:'delray',n:'Carmela Delray East',s:'Underperforming',cls:'sell',bl:'🔴 For Sale'},
  {id:'stuart',n:'Carmela Stuart',s:'Underperforming',cls:'sell',bl:'🔴 For Sale'}
];
const LENS = [
  {n:'1',l:'Clarity Check'},{n:'2',l:'First Principles'},{n:'3',l:'Inversion'},
  {n:'4',l:'Asymmetry Scan'},{n:'5',l:'Compounding Horizon'},{n:'6',l:'Energy Alignment'},{n:'7',l:'Execution Gap'}
];
const QUICK = ['Sell the 2 coffee shops faster','Best job search strategy','Attack the 12% loan','Optimize BRIC','Investment account strategy','Commitment close'];

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  screen: 'api', // 'api' | 'onboarding' | 'chat'
  apiKey: localStorage.getItem('aa_api_key') || '',
  apiErr: '',
  messages: [],
  loading: false,
  error: null,
  lastQ: '',
  scores: {wealth:5,health:6,happiness:5,legacy:6},
  commits: [],
  showCommit: false,
  showScore: false,
  newCommit: {text:'',date:''},
  actPillar: null,
  actBiz: null,
};

// Restore session from localStorage
if (state.apiKey) {
  state.screen = 'onboarding';
  const saved = localStorage.getItem('aa_messages');
  if (saved) { try { state.messages = JSON.parse(saved); if (state.messages.length > 0) state.screen = 'chat'; } catch(e){} }
  const savedScores = localStorage.getItem('aa_scores');
  if (savedScores) { try { state.scores = JSON.parse(savedScores); } catch(e){} }
  const savedCommits = localStorage.getItem('aa_commits');
  if (savedCommits) { try { state.commits = JSON.parse(savedCommits); } catch(e){} }
}

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(ts) {
  return new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function parseMd(t) {
  return t
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br/>')
    .trim();
}

function saveMessages() { localStorage.setItem('aa_messages', JSON.stringify(state.messages)); }
function saveScores() { localStorage.setItem('aa_scores', JSON.stringify(state.scores)); }
function saveCommits() { localStorage.setItem('aa_commits', JSON.stringify(state.commits)); }

// ─── API CALL ─────────────────────────────────────────────────────────────────
async function send(text) {
  if (!text.trim() || state.loading) return;
  const ts = Date.now();
  const userMsg = {role:'user', content:text, ts};
  const updated = [...state.messages, userMsg];
  setState({messages: updated, loading: true, error: null, lastQ: text,
    screen: state.screen === 'onboarding' ? 'chat' : state.screen});
  saveMessages();

  try {
    const res = await fetch('https://corsproxy.io/?https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-allow-cors': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: updated.map(m => ({role:m.role, content:m.content}))
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content?.[0]?.text;
    if (!reply) throw new Error('Empty response');

    const newMsgs = [...updated, {role:'assistant', content:reply, ts:Date.now()}];
    setState({messages: newMsgs, loading: false, error: null});
    saveMessages();
  } catch(e) {
    setState({
      messages: updated.slice(0,-1),
      loading: false,
      error: e.message || 'Connection failed'
    });
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function bindEvents() {
  // API screen
  const apiSubmit = document.getElementById('apiSubmit');
  if (apiSubmit) {
    apiSubmit.onclick = () => {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key.startsWith('sk-ant-')) {
        setState({apiErr:'Key must start with sk-ant-'});
        return;
      }
      localStorage.setItem('aa_api_key', key);
      setState({apiKey:key, screen:'onboarding', apiErr:''});
    };
    document.getElementById('apiKeyInput').onkeydown = e => {
      if (e.key === 'Enter') apiSubmit.click();
    };
  }

  // Onboarding
  const startBtn = document.getElementById('startSession');
  if (startBtn) {
    startBtn.onclick = () => {
      setState({screen:'chat'});
      setTimeout(()=>send('Begin my session. Give me your honest assessment of where I stand and my top 3 priorities. No fluff.'), 100);
    };
  }

  // Chat
  const sendBtn = document.getElementById('sendBtn');
  const chatInp = document.getElementById('chatInput');
  if (sendBtn) sendBtn.onclick = () => { if (chatInp) send(chatInp.value); };
  if (chatInp) {
    chatInp.onkeydown = e => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); send(chatInp.value); }};
    chatInp.oninput = e => {
      e.target.style.height='44px';
      e.target.style.height=Math.min(e.target.scrollHeight,130)+'px';
    };
  }

  const retryBtn = document.getElementById('retryBtn');
  if (retryBtn) retryBtn.onclick = () => send(state.lastQ);

  const closeBtn = document.getElementById('closeSession');
  if (closeBtn) closeBtn.onclick = () => send('Give me my commitment close for this session.');

  const clearBtn = document.getElementById('clearChat');
  if (clearBtn) clearBtn.onclick = () => {
    setState({messages:[], error:null, screen:'onboarding'});
    localStorage.removeItem('aa_messages');
  };

  const changeKeyBtn = document.getElementById('changeKey');
  if (changeKeyBtn) changeKeyBtn.onclick = () => setState({screen:'api'});

  // Pillar cards
  document.querySelectorAll('[data-pillar]').forEach(el => {
    el.onclick = () => {
      if (state.screen !== 'chat') return;
      const p = PILLARS.find(x=>x.id===el.dataset.pillar);
      if (p) { setState({actPillar:p.id}); send(`Deep dive on my ${p.l} pillar based on my real situation.`); }
    };
  });

  // Biz cards
  document.querySelectorAll('[data-biz]').forEach(el => {
    el.onclick = () => {
      if (state.screen !== 'chat') return;
      const id = el.dataset.biz;
      setState({actBiz:id});
      if (id==='bric') send('How do I optimize and protect BRIC — my $8k/month star asset?');
      else if (id==='delray') send('Best playbook to sell Carmela Delray East fast at the best price?');
      else send('Best playbook to sell Carmela Stuart fast at the best price?');
    };
  });

  // Lens steps
  document.querySelectorAll('[data-lens]').forEach(el => {
    el.onclick = () => {
      if (state.screen !== 'chat') return;
      const s = LENS.find(x=>x.n===el.dataset.lens);
      if (s) send(`Apply Step ${s.n}: ${s.l} to my current situation.`);
    };
  });

  // Quick buttons
  document.querySelectorAll('[data-quick]').forEach(el => {
    el.onclick = () => send(el.dataset.quick);
  });

  // Commitments toggle
  document.querySelectorAll('[data-commit]').forEach(el => {
    el.onclick = () => {
      const id = parseInt(el.dataset.commit);
      const updated = state.commits.map(c=>c.id===id?{...c,done:!c.done}:c);
      setState({commits:updated});
      saveCommits();
    };
  });

  // Commitment modal
  const openCommit = document.getElementById('openCommit');
  if (openCommit) openCommit.onclick = () => setState({showCommit:true});

  const cancelCommit = document.getElementById('cancelCommit');
  if (cancelCommit) cancelCommit.onclick = () => setState({showCommit:false, newCommit:{text:'',date:''}});

  const commitOverlay = document.getElementById('commitOverlay');
  if (commitOverlay) commitOverlay.onclick = e => { if(e.target===commitOverlay) setState({showCommit:false}); };

  const saveCommitBtn = document.getElementById('saveCommit');
  if (saveCommitBtn) saveCommitBtn.onclick = () => {
    const text = document.getElementById('commitText').value.trim();
    const date = document.getElementById('commitDate').value;
    if (!text) return;
    const updated = [...state.commits, {text, date, done:false, id:Date.now()}];
    setState({commits:updated, showCommit:false, newCommit:{text:'',date:''}});
    saveCommits();
  };

  // Score modal
  const openScores = document.getElementById('openScores');
  if (openScores) openScores.onclick = () => setState({showScore:true});

  const cancelScore = document.getElementById('cancelScore');
  if (cancelScore) cancelScore.onclick = () => setState({showScore:false});

  const scoreOverlay = document.getElementById('scoreOverlay');
  if (scoreOverlay) scoreOverlay.onclick = e => { if(e.target===scoreOverlay) setState({showScore:false}); };

  document.querySelectorAll('[data-score]').forEach(el => {
    el.oninput = () => {
      const id = el.dataset.score;
      const val = parseInt(el.value);
      const valEl = document.getElementById(`sv_${id}`);
      if (valEl) valEl.textContent = val;
      state.scores[id] = val;
    };
  });

  const saveScoreBtn = document.getElementById('saveScore');
  if (saveScoreBtn) saveScoreBtn.onclick = () => {
    const s = state.scores;
    setState({showScore:false});
    saveScores();
    send(`Updated scores: Wealth ${s.wealth}/10, Health ${s.health}/10, Happiness ${s.happiness}/10, Legacy ${s.legacy}/10. Based on my real situation, where should I focus?`);
  };
}

function scrollToBottom() {
  setTimeout(() => {
    const el = document.getElementById('msgEnd');
    if (el) el.scrollIntoView({behavior:'smooth'});
  }, 50);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
